services:
  nginx:
    image: nginx:latest
    container_name: sacre.nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Monta a configuração do Nginx
      - ./nginx/site.conf:/etc/nginx/conf.d/default.conf:ro
      # Monta a pasta com o certificado e a chave autoassinados
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./maintenance:/var/www/maintenance:ro # Monta a página de manutenção
    restart: unless-stopped
    networks:
      - sacre 
networks:
  sacre:
    name: sacre
    external: true
 